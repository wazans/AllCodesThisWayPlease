<h3>Mixed Dynamic Table</h3>

<button id="updateBtn" onclick="updateValues()">Update Dynamic Values</button>

<table id="mixedTable" border="1" style="margin-top:15px; width:100%; text-align:center;">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Role</th>
      <th>Status</th>
      <th>Score</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>101</td>
      <td>Wasim</td>
      <td>QA</td>
      <td class="status">Active</td>
      <td class="score">50</td>
    </tr>
    <tr>
      <td>102</td>
      <td>Ali</td>
      <td>Dev</td>
      <td class="status">Inactive</td>
      <td class="score">60</td>
    </tr>
    <tr>
      <td>103</td>
      <td>John</td>
      <td>Manager</td>
      <td class="status">Active</td>
      <td class="score">70</td>
    </tr>
  </tbody>
</table>

<script>
  function updateValues() {
    let statuses = document.getElementsByClassName("status");
    let scores = document.getElementsByClassName("score");

    for (let i = 0; i < statuses.length; i++) {
      statuses[i].innerText = (Math.random() > 0.5) ? "Active" : "Inactive";
      scores[i].innerText = Math.floor(Math.random() * 100);
    }
  }
</script>
