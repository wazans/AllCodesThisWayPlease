<!DOCTYPE html>
<html>
<head>
    <title>Locator Practice</title>
    <style>
        .box { border: 1px solid black; padding: 10px; margin: 10px; }
        .highlight { color: red; }
    </style>
</head>
<body>

<h1 id="main-title">Welcome</h1>

<div class="box" id="parent">
    <p class="text">Child 1</p>
    <p class="text special">Child 2</p>
    <span class="text">Child 3</span>
</div>

<div class="box" id="parent">
    <p class="text">Child dup</p>
    <p class="text special">Child dup</p>
    <span class="text">Child dup</span>
</div>

<h2 class="box" id="parent">
    <p class="text">Child wasim</p>
    <p class="text special">Child wasim2</p>
    <span class="text">Child wasim3</span>
</h2>

<ul id="list">
    <li class="item">Item 1</li>
    <li class="item">Item 2</li>
    <li class="item special">Item 3</li>
</ul>

<input type="text" id="username" placeholder="Enter name"/>
<input type="password" id="password" placeholder="Enter password"/>

<div class="container">
    <div class="child">Direct Child</div>
    <div>
        <span class="subchild">Nested Child</span>
    </div>
</div>

</body>
</html>
